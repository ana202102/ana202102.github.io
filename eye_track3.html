<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 監控系統 - 輕量化版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        h2 { margin: 10px 0; font-size: 1.2rem; }
        
        /* 緊湊型配置面板 */
        .tg-config { background: #2c3e50; padding: 10px; border-radius: 8px; margin-bottom: 8px; width: 800px; box-sizing: border-box; border: 1px solid #444; }
        .config-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .switch-group { display: flex; gap: 15px; font-size: 12px; border-top: 1px solid #3e4f5f; padding-top: 8px; }
        
        .controls { background: #333; padding: 10px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 8px; align-items: center; width: 800px; justify-content: center; box-sizing: border-box; }

        /* 單行統計面板 */
        .stats-panel-mini { 
            background: #222; padding: 8px 15px; border-radius: 8px; margin-bottom: 8px; width: 800px; 
            border: 1px solid #444; box-sizing: border-box; display: flex; justify-content: space-around; font-size: 0.9rem;
        }
        .stat-item { display: flex; align-items: center; gap: 5px; }
        .stat-label { color: #aaa; }
        .stat-value { font-weight: bold; color: #00ff88; min-width: 45px; }
        .stat-value.danger { color: #ff4444; }

        .container { position: relative; border: 2px solid #444; border-radius: 8px; overflow: hidden; background: #000; line-height: 0; }
        video { width: 800px; height: auto; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; cursor: crosshair; }
        
        button, select, input[type="text"] { padding: 5px 10px; border-radius: 4px; border: none; background: #444; color: white; font-size: 12px; }
        #resetBtn { background: #dc3545; cursor: pointer; }
        
        .log-panel { width: 800px; height: 80px; overflow-y: auto; background: #000; padding: 8px; font-size: 11px; color: #888; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; margin-top: 8px; }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #444; padding-left: 5px; }
        label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

    <h2>AI 監控：智能預警系統</h2>

    <div class="tg-config">
        <div class="config-row">
            <input type="text" id="tgToken" placeholder="Bot Token" style="flex: 2;">
            <input type="text" id="tgChatId" placeholder="Chat ID" style="flex: 1;">
        </div>
        <div class="switch-group">
            <label><input type="checkbox" id="enableTG" checked> Telegram 傳送</label>
            <label><input type="checkbox" id="enableDownload" checked> 本地截圖下載</label>
        </div>
    </div>

    <div class="controls">
        <select id="cameraSelect"><option>讀取鏡頭...</option></select>
        <input type="file" id="fileInput" accept="video/*" style="width: 150px;">
        <label>截圖門檻：</label>
        <select id="thresholdSelect">
            <option value="0">不處理</option>
            <option value="5">5s</option>
            <option value="10" selected>10s</option>
            <option value="30">30s</option>
        </select>
        <button id="resetBtn">重置數據</button>
    </div>

    <div class="stats-panel-mini">
        <div class="stat-item"><span class="stat-label">正臉:</span><span id="time-front" class="stat-value">0.0s</span></div>
        <div class="stat-item"><span class="stat-label">左轉:</span><span id="time-left" class="stat-value">0.0s</span></div>
        <div class="stat-item"><span class="stat-label">右轉:</span><span id="time-right" class="stat-value">0.0s</span></div>
        <div class="stat-item"><span class="stat-label">遺失:</span><span id="time-lost" class="stat-value danger">0.0s</span></div>
    </div>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="log-panel" id="logPanel">系統初始化中...</div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const logPanel = document.getElementById("logPanel");
        
        let stats = { front: 0, left: 0, right: 0, lost: 0 };
        let currentContinuousTime = 0;
        let lastState = "none";
        let hasScreenshotTaken = false;
        let lastTimestamp = performance.now();
        let faceLandmarker, results = null, isTracking = false, targetFacePos = null;

        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO", numFaces: 5
                });
                addLog("模型載入成功");
                setupCamera();
                renderLoop();
            } catch (e) { addLog(`初始化失敗: ${e.message}`, "#ff4444"); }
        }

        function addLog(msg, color = "#888") {
            const now = new Date().toLocaleTimeString();
            const div = document.createElement("div");
            div.className = "log-entry";
            div.innerHTML = `<span style="color:#555">[${now}]</span> <span style="color:${color}">${msg}</span>`;
            logPanel.insertBefore(div, logPanel.firstChild);
        }

        async function setupCamera(deviceId = null) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: deviceId ? { deviceId: { exact: deviceId } } : true });
                video.srcObject = stream;
            } catch (err) { addLog(`鏡頭錯誤: ${err.message}`, "#ff4444"); }
        }

        async function sendToTelegram(blob, caption) {
            const token = document.getElementById("tgToken").value;
            const chatId = document.getElementById("tgChatId").value;
            if (!token || !chatId) return;

            const formData = new FormData();
            formData.append("chat_id", chatId);
            formData.append("caption", caption);
            formData.append("photo", blob, "alert.png");

            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
                if (res.ok) addLog("Telegram 警報已送達", "#3498db");
            } catch (e) { addLog(`網路錯誤: 無法連接 Telegram`, "#ff4444"); }
        }

        function takeScreenshot(stateName, duration) {
            const isDownloadEnabled = document.getElementById("enableDownload").checked;
            const isTGEnabled = document.getElementById("enableTG").checked;

            if (!isDownloadEnabled && !isTGEnabled) return;

            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tCtx = tempCanvas.getContext("2d");
            tCtx.drawImage(video, 0, 0);

            const now = new Date();
            const timeStr = now.toLocaleString();
            tCtx.fillStyle = "rgba(0,0,0,0.7)";
            tCtx.fillRect(0, 0, 480, 50);
            tCtx.fillStyle = "#00ff88";
            tCtx.font = "bold 20px Arial";
            tCtx.fillText(`${timeStr} - ${stateName} (${duration.toFixed(1)}s)`, 15, 32);

            tempCanvas.toBlob((blob) => {
                if (isDownloadEnabled) {
                    const link = document.createElement("a");
                    link.download = `Alert_${stateName}_${now.getTime()}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    addLog(`已觸發本地下載 (原因: ${stateName} 持續 ${duration.toFixed(1)}s)`, "#00ff88");
                }
                if (isTGEnabled) sendToTelegram(blob, `⚠️ 監控警報：${stateName} (${duration.toFixed(1)}s)\n時間：${timeStr}`);
            }, "image/png");
        }

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) / rect.width;
            const clickY = (e.clientY - rect.top) / rect.height;
            if (results?.faceLandmarks) {
                results.faceLandmarks.forEach(landmarks => {
                    if (Math.hypot(clickX - landmarks[1].x, clickY - landmarks[1].y) < 0.1) {
                        targetFacePos = { x: landmarks[1].x, y: landmarks[1].y };
                        isTracking = true;
                        addLog("目標已鎖定", "#00ff88");
                    }
                });
            }
        });

        function renderLoop() {
            const now = performance.now();
            const deltaTime = (now - lastTimestamp) / 1000;
            lastTimestamp = now;

            if (video.readyState >= 2) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                results = faceLandmarker.detectForVideo(video, now);
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                let activeFace = null, currentState = "none";
                if (results.faceLandmarks) {
                    results.faceLandmarks.forEach(landmarks => {
                        if (isTracking && targetFacePos && Math.hypot(landmarks[1].x - targetFacePos.x, landmarks[1].y - targetFacePos.y) < 0.2) {
                            activeFace = landmarks;
                            targetFacePos = { x: landmarks[1].x, y: landmarks[1].y };
                        }
                        drawUI(landmarks, false);
                    });
                }

                if (isTracking) {
                    if (activeFace) {
                        const ratio = (activeFace[1].x - activeFace[234].x) / (activeFace[454].x - activeFace[234].x);
                        currentState = ratio < 0.38 ? "左轉" : (ratio > 0.62 ? "右轉" : "正臉");
                        if (currentState === "正臉") stats.front += deltaTime;
                        else if (currentState === "左轉") stats.left += deltaTime;
                        else if (currentState === "右轉") stats.right += deltaTime;
                    } else {
                        currentState = "遺失";
                        stats.lost += deltaTime;
                    }

                    if (currentState === lastState) currentContinuousTime += deltaTime;
                    else { currentContinuousTime = 0; hasScreenshotTaken = false; }
                    lastState = currentState;

                    const threshold = parseFloat(document.getElementById("thresholdSelect").value);
                    if (threshold > 0 && currentState !== "正臉" && currentState !== "none" && currentContinuousTime >= threshold && !hasScreenshotTaken) {
                        takeScreenshot(currentState, currentContinuousTime);
                        hasScreenshotTaken = true;
                    }
                    drawUI(activeFace, true, `${currentState} (${currentContinuousTime.toFixed(1)}s)`);
                }
                updateDashboard();
            }
            requestAnimationFrame(renderLoop);
        }

        function updateDashboard() {
            document.getElementById("time-front").innerText = stats.front.toFixed(1) + "s";
            document.getElementById("time-left").innerText = stats.left.toFixed(1) + "s";
            document.getElementById("time-right").innerText = stats.right.toFixed(1) + "s";
            document.getElementById("time-lost").innerText = stats.lost.toFixed(1) + "s";
        }

        function drawUI(landmarks, isTarget, label = "") {
            if (!landmarks) return;
            const color = isTarget ? "#00ff88" : "rgba(255,255,255,0.1)";
            ctx.strokeStyle = color;
            [468, 473].forEach(i => {
                const p = landmarks[i];
                ctx.beginPath(); ctx.arc(p.x * canvas.width, p.y * canvas.height, 4, 0, 2*Math.PI); ctx.stroke();
            });
            if (isTarget) {
                ctx.fillStyle = color; ctx.font = "16px Arial";
                ctx.fillText(label, landmarks[1].x * canvas.width - 20, landmarks[10].y * canvas.height - 20);
            }
        }

        document.getElementById("resetBtn").onclick = () => { 
            stats = { front: 0, left: 0, right: 0, lost: 0 }; 
            isTracking = false; 
            currentContinuousTime = 0;
            addLog("數據已重置", "#dc3545");
        };

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 監控 - Pixel 6 優化版</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; touch-action: manipulation; }
        .ui-width { width: 95vw; max-width: 800px; box-sizing: border-box; }
        .tg-config { background: #2c3e50; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #444; }
        .config-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .switch-group { display: flex; justify-content: space-around; font-size: 12px; border-top: 1px solid #3e4f5f; padding-top: 8px; }
        .controls { background: #333; padding: 10px; border-radius: 8px; display: flex; gap: 8px; margin-bottom: 8px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .stats-panel-mini { background: #222; padding: 8px 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #444; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .stat-value { font-weight: bold; color: #00ff88; }
        .stat-value.danger { color: #ff4444; }
        .container { position: relative; border: 2px solid #444; border-radius: 8px; overflow: hidden; background: #000; width: 95vw; max-width: 800px; aspect-ratio: 4/3; }
        /* Pixel 6 前鏡頭鏡像處理 */
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        button, select, input[type="text"] { padding: 10px; border-radius: 4px; border: none; background: #444; color: white; font-size: 14px; }
        #resetBtn { background: #dc3545; flex-grow: 1; font-weight: bold; }
        .log-panel { height: 100px; overflow-y: auto; background: #000; padding: 8px; font-size: 11px; color: #aaa; border-radius: 8px; border: 1px solid #333; margin-top: 8px; width: 95vw; }
        .log-entry { margin-bottom: 2px; border-left: 2px solid #444; padding-left: 5px; }
        label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

    <div class="tg-config ui-width">
        <div class="config-row">
            <input type="text" id="tgToken" placeholder="Bot Token (預設關閉)" style="flex: 2;">
            <input type="text" id="tgChatId" placeholder="Chat ID" style="flex: 1;">
        </div>
        <div class="switch-group">
            <label><input type="checkbox" id="enableTG"> Telegram 上傳</label>
            <label><input type="checkbox" id="enableDownload" checked> 本機下載截圖</label>
        </div>
    </div>

    <div class="controls ui-width">
        <select id="thresholdSelect" style="flex: 1;">
            <option value="0">不處理</option>
            <option value="3">3s 門檻</option>
            <option value="5">5s 門檻</option>
            <option value="10" selected>10s 門檻</option>
        </select>
        <button id="resetBtn">重置數據 / 重新鎖定</button>
    </div>

    <div class="stats-panel-mini ui-width">
        <div>正:<span id="time-front" class="stat-value">0.0s</span></div>
        <div>左:<span id="time-left" class="stat-value">0.0s</span></div>
        <div>右:<span id="time-right" class="stat-value">0.0s</span></div>
        <div>失:<span id="time-lost" class="stat-value danger">0.0s</span></div>
    </div>

    <div class="container" id="videoContainer">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="log-panel ui-width" id="logPanel">等待系統初始化...</div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const logPanel = document.getElementById("logPanel");
        
        let stats = { front: 0, left: 0, right: 0, lost: 0 };
        let currentContinuousTime = 0;
        let lastState = "none";
        let hasScreenshotTaken = false;
        let lastTimestamp = performance.now();
        let faceLandmarker, results = null, isTracking = false, targetFacePos = null;

        function addLog(msg, color = "#aaa") {
            const div = document.createElement("div");
            div.className = "log-entry";
            div.innerHTML = `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
            logPanel.insertBefore(div, logPanel.firstChild);
        }

        async function init() {
            // HTTPS 環境檢測
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                addLog("警告：請使用 HTTPS 網址開啟，否則無法啟動鏡頭！", "#ff4444");
                return;
            }

            try {
                addLog("正在載入 AI 視覺模型...");
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO", numFaces: 1
                });
                addLog("模型載入成功");
                await setupCamera();
                renderLoop();
            } catch (e) { 
                addLog(`初始化異常: ${e.message}`, "#ff4444");
            }
        }

        async function setupCamera() {
            addLog("正在調用鏡頭權限...");
            const constraints = {
                video: {
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        addLog("相機就緒，請點擊畫面中的臉部進行鎖定");
                        resolve();
                    };
                });
            } catch (err) {
                addLog(`相機啟動失敗: ${err.name}`, "#ff4444");
                if (err.name === "OverconstrainedError") {
                    addLog("嘗試降級設定以符合裝置限制...", "#f1c40f");
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = fallbackStream;
                }
            }
        }

        const handleInteraction = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // 配合 CSS 鏡像效果進行座標計算
            const clickX = 1 - (clientX - rect.left) / rect.width;
            const clickY = (clientY - rect.top) / rect.height;

            if (results?.faceLandmarks) {
                results.faceLandmarks.forEach(landmarks => {
                    if (Math.hypot(clickX - landmarks[1].x, clickY - landmarks[1].y) < 0.2) {
                        targetFacePos = { x: landmarks[1].x, y: landmarks[1].y };
                        isTracking = true;
                        addLog("目標臉部已鎖定", "#00ff88");
                    }
                });
            }
        };

        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleInteraction(e); }, {passive: false});
        canvas.addEventListener("mousedown", handleInteraction);

        function takeScreenshot(stateName, duration) {
            const isDownloadEnabled = document.getElementById("enableDownload").checked;
            const isTGEnabled = document.getElementById("enableTG").checked;
            
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tCtx = tempCanvas.getContext("2d");
            
            // 截圖存檔時轉回正常視角
            tCtx.translate(tempCanvas.width, 0);
            tCtx.scale(-1, 1);
            tCtx.drawImage(video, 0, 0);
            tCtx.setTransform(1, 0, 0, 1, 0, 0);

            const timeStr = new Date().toLocaleString();
            tCtx.fillStyle = "rgba(0,0,0,0.6)";
            tCtx.fillRect(0, 0, tempCanvas.width, 40);
            tCtx.fillStyle = "#0ff";
            tCtx.font = "20px Arial";
            tCtx.fillText(`${stateName}持續 ${duration.toFixed(1)}s - ${timeStr}`, 10, 28);

            tempCanvas.toBlob((blob) => {
                if (isDownloadEnabled) {
                    const link = document.createElement("a");
                    link.download = `Alert_${Date.now()}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    addLog("警報截圖已下載", "#00ff88");
                }
                if (isTGEnabled) {
                    const token = document.getElementById("tgToken").value;
                    const chatId = document.getElementById("tgChatId").value;
                    if (token && chatId) {
                        const formData = new FormData();
                        formData.append("chat_id", chatId);
                        formData.append("caption", `⚠️ 警報通知: ${stateName}持續 ${duration.toFixed(1)} 秒`);
                        formData.append("photo", blob);
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData })
                        .then(r => { if(r.ok) addLog("Telegram 已成功傳送", "#3498db"); });
                    }
                }
            }, "image/png");
        }

        function renderLoop() {
            const now = performance.now();
            const deltaTime = (now - lastTimestamp) / 1000;
            lastTimestamp = now;

            if (video.readyState >= 2) {
                results = faceLandmarker.detectForVideo(video, now);
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                let activeFace = null;
                let currentState = "none";

                if (results.faceLandmarks) {
                    results.faceLandmarks.forEach(landmarks => {
                        if (isTracking && targetFacePos && Math.hypot(landmarks[1].x - targetFacePos.x, landmarks[1].y - targetFacePos.y) < 0.3) {
                            activeFace = landmarks;
                            targetFacePos = { x: landmarks[1].x, y: landmarks[1].y };
                        }
                        drawUI(landmarks, false);
                    });
                }

                if (isTracking) {
                    if (activeFace) {
                        const ratio = (activeFace[1].x - activeFace[234].x) / (activeFace[454].x - activeFace[234].x);
                        currentState = ratio < 0.38 ? "左轉" : (ratio > 0.62 ? "右轉" : "正臉");
                        if (currentState === "正臉") stats.front += deltaTime;
                        else if (currentState === "左轉") stats.left += deltaTime;
                        else if (currentState === "右轉") stats.right += deltaTime;
                    } else {
                        currentState = "遺失";
                        stats.lost += deltaTime;
                    }

                    if (currentState === lastState) currentContinuousTime += deltaTime;
                    else { currentContinuousTime = 0; hasScreenshotTaken = false; }
                    lastState = currentState;

                    const threshold = parseFloat(document.getElementById("thresholdSelect").value);
                    if (threshold > 0 && currentState !== "正臉" && currentState !== "none" && currentContinuousTime >= threshold && !hasScreenshotTaken) {
                        takeScreenshot(currentState, currentContinuousTime);
                        hasScreenshotTaken = true;
                    }
                    drawUI(activeFace, true, `${currentState} ${currentContinuousTime.toFixed(1)}s`);
                }
                updateDashboard();
            }
            requestAnimationFrame(renderLoop);
        }

        function updateDashboard() {
            document.getElementById("time-front").innerText = stats.front.toFixed(1) + "s";
            document.getElementById("time-left").innerText = stats.left.toFixed(1) + "s";
            document.getElementById("time-right").innerText = stats.right.toFixed(1) + "s";
            document.getElementById("time-lost").innerText = stats.lost.toFixed(1) + "s";
        }

        function drawUI(landmarks, isTarget, label = "") {
            if (!landmarks) return;
            ctx.strokeStyle = isTarget ? "#00ff88" : "rgba(255,255,255,0.2)";
            ctx.lineWidth = isTarget ? 3 : 1;
            
            [468, 473].forEach(i => {
                const p = landmarks[i];
                ctx.beginPath(); ctx.arc(p.x * canvas.width, p.y * canvas.height, 4, 0, 2*Math.PI); ctx.stroke();
            });

            if (isTarget) {
                ctx.fillStyle = "#00ff88"; ctx.font = "bold 24px Arial";
                // 修正文字位置避免受鏡像翻轉影響
                ctx.save();
                ctx.scale(-1, 1);
                ctx.fillText(label, -(landmarks[10].x * canvas.width), landmarks[10].y * canvas.height - 20);
                ctx.restore();
            }
        }

        document.getElementById("resetBtn").onclick = () => { 
            stats = { front: 0, left: 0, right: 0, lost: 0 }; 
            isTracking = false; 
            targetFacePos = null;
            addLog("系統重置，請重新鎖定臉部", "#dc3545");
        };

        init();
    </script>
</body>
</html>

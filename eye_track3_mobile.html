<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 監控 - 巨型 UI 版</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #1a1a1a; color: #eee; display: flex; flex-direction: column; 
            align-items: center; padding: 10px; margin: 0; touch-action: manipulation;
            font-size: 22px; /* 基礎字體進一步放大 */
        }
        
        .ui-width { width: 95vw; max-width: 800px; box-sizing: border-box; }

        /* 配置區塊 */
        .tg-config { background: #2c3e50; padding: 18px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #444; }
        .config-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .config-row input[type="text"] { font-size: 20px; padding: 15px; border-radius: 10px; } 

        .switch-group { 
            display: flex; justify-content: space-around; 
            font-size: 22px; font-weight: bold;
            border-top: 2px solid #3e4f5f; padding-top: 15px; 
        }
        .switch-group label { gap: 12px; }
        .switch-group input[type="checkbox"] { transform: scale(2.2); } /* 超大勾選框 */
        
        /* 控制區塊 */
        .controls { 
            background: #333; padding: 18px; border-radius: 15px; 
            display: flex; gap: 12px; margin-bottom: 12px; 
            align-items: center; justify-content: space-between; flex-wrap: wrap; 
        }

        /* 數據面板 - 巨型數字 */
        .stats-panel-mini { 
            background: #222; padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; border: 2px solid #555; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            font-size: 1.4rem; font-weight: 900; text-align: center;
        }
        .stat-item { background: #2d2d2d; padding: 10px; border-radius: 10px; }
        .stat-value { color: #00ff88; font-family: monospace; }
        .stat-value.danger { color: #ff4444; }

        /* 影片容器 */
        .container { position: relative; border: 3px solid #666; border-radius: 15px; overflow: hidden; background: #000; width: 95vw; max-width: 800px; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
        
        .mirror video, .mirror canvas { transform: scaleX(-1); }
        
        /* 按鈕與選單 - 巨型化 */
        button, select { 
            padding: 18px; border-radius: 12px; border: none; 
            background: #444; color: white; font-size: 22px; font-weight: 900;
        }
        
        .action-btn { flex: 1; text-align: center; min-width: 120px; }
        #resetBtn { background: #dc3545; }
        #switchCamBtn { background: #3498db; }
        #thresholdSelect { background: #555; flex: 1.5; }
        
        /* 日誌面板 */
        .log-panel { 
            height: 140px; overflow-y: auto; background: #000; 
            padding: 12px; font-size: 16px; color: #bbb; 
            border-radius: 15px; border: 1px solid #444; 
            margin-top: 15px; width: 95vw; max-width: 800px;
        }
        .log-entry { margin-bottom: 6px; border-left: 5px solid #00ff88; padding-left: 10px; }
    </style>
</head>
<body>

    <div class="tg-config ui-width">
        <div class="config-row">
            <input type="text" id="tgToken" placeholder="Bot Token" style="flex: 2;">
            <input type="text" id="tgChatId" placeholder="Chat ID" style="flex: 1;">
        </div>
        <div class="switch-group">
            <label><input type="checkbox" id="enableTG"> TG</label>
            <label><input type="checkbox" id="enableDownload" checked> 下載</label>
        </div>
    </div>

    <div class="controls ui-width">
        <select id="thresholdSelect">
            <option value="0">不處理</option>
            <option value="3">3s 警報</option>
            <option value="5">5s 警報</option>
            <option value="10" selected>10s 警報</option>
        </select>
        <button id="switchCamBtn" class="action-btn">鏡頭</button>
        <button id="resetBtn" class="action-btn">重置</button>
    </div>

    <div class="stats-panel-mini ui-width">
        <div class="stat-item">正：<span id="time-front" class="stat-value">0.0s</span></div>
        <div class="stat-item">左：<span id="time-left" class="stat-value">0.0s</span></div>
        <div class="stat-item">右：<span id="time-right" class="stat-value">0.0s</span></div>
        <div class="stat-item">失：<span id="time-lost" class="stat-value danger">0.0s</span></div>
    </div>

    <div class="container mirror" id="videoContainer">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="log-panel ui-width" id="logPanel">系統初始化...</div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const logPanel = document.getElementById("logPanel");
        const videoContainer = document.getElementById("videoContainer");
        
        let stats = { front: 0, left: 0, right: 0, lost: 0 };
        let currentContinuousTime = 0;
        let lastState = "none";
        let hasScreenshotTaken = false;
        let lastTimestamp = performance.now();
        let faceLandmarker, results = null, isTracking = false, targetFacePos = null;

        let currentFacingMode = "user"; 
        let currentStream = null;

        function addLog(msg, color = "#aaa") {
            const div = document.createElement("div");
            div.className = "log-entry";
            div.innerHTML = `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
            logPanel.insertBefore(div, logPanel.firstChild);
        }

        async function init() {
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                addLog("!! 請使用 HTTPS 網址 !!", "#ff4444");
                return;
            }
            try {
                addLog("載入模型中...");
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO", numFaces: 1
                });
                addLog("模型載入成功");
                await setupCamera();
                renderLoop();
            } catch (e) { addLog(`錯誤: ${e.message}`, "#ff4444"); }
        }

        async function setupCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            if (currentFacingMode === "user") videoContainer.classList.add("mirror");
            else videoContainer.classList.remove("mirror");

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = currentStream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        addLog(`${currentFacingMode === "user" ? "前" : "後"}相機啟動`);
                        isTracking = false; targetFacePos = null;
                        resolve();
                    };
                });
            } catch (err) { addLog(`鏡頭失敗: ${err.name}`, "#ff4444"); }
        }

        const handleInteraction = (e) => {
            if (video.readyState < 2) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            let clickX = (clientX - rect.left) / rect.width;
            let clickY = (clientY - rect.top) / rect.height;
            if (currentFacingMode === "user") clickX = 1 - clickX;

            if (results?.faceLandmarks) {
                results.faceLandmarks.forEach(landmarks => {
                    if (Math.hypot(clickX - landmarks[1].x, clickY - landmarks[1].y) < 0.25) {
                        targetFacePos = { x: landmarks[1].x, y: landmarks[1].y };
                        isTracking = true;
                        addLog("目標鎖定!", "#00ff88");
                    }
                });
            }
        };

        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleInteraction(e); }, {passive: false});
        canvas.addEventListener("mousedown", handleInteraction);

        document.getElementById("switchCamBtn").onclick = async () => {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            await setupCamera();
        };

        function takeScreenshot(stateName, duration) {
            const isDownloadEnabled = document.getElementById("enableDownload").checked;
            const isTGEnabled = document.getElementById("enableTG").checked;
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tCtx = tempCanvas.getContext("2d");
            if (currentFacingMode === "user") { tCtx.translate(tempCanvas.width, 0); tCtx.scale(-1, 1); }
            tCtx.drawImage(video, 0, 0);
            tCtx.setTransform(1, 0, 0, 1, 0, 0);

            const timeStr = new Date().toLocaleString();
            tCtx.fillStyle = "rgba(0,0,0,0.7)";
            tCtx.fillRect(0, 0, tempCanvas.width, 70); 
            tCtx.fillStyle = "#0ff";
            tCtx.font = "bold 32px Arial";
            tCtx.fillText(`${stateName} ${duration.toFixed(1)}s - ${timeStr}`, 20, 45);

            tempCanvas.toBlob((blob) => {
                if (isDownloadEnabled) {
                    const link = document.createElement("a");
                    link.download = `Alert_${Date.now()}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                }
                if (isTGEnabled) {
                    const token = document.getElementById("tgToken").value;
                    const chatId = document.getElementById("tgChatId").value;
                    if (token && chatId) {
                        const formData = new FormData();
                        formData.append("chat_id", chatId);
                        formData.append("caption", `⚠️ ${stateName}持續 ${duration.toFixed(1)} 秒`);
                        formData.append("photo", blob);
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
                        addLog("TG 傳送中...");
                    }
                }
            }, "image/png");
        }

        function renderLoop() {
            const now = performance.now();
            const deltaTime = (now - lastTimestamp) / 1000;
            lastTimestamp = now;

            if (video.readyState >= 2) {
                results = faceLandmarker.detectForVideo(video, now);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let activeFace = null;
                let currentState = "none";

                if (results.faceLandmarks) {
                    results.faceLandmarks.forEach(landmarks => {
                        if (isTracking && targetFacePos && Math.hypot(landmarks[1].x - targetFacePos.x, landmarks[1].y - targetFacePos.y) < 0.35) {
                            activeFace = landmarks;
                            targetFacePos = { x: landmarks[1].x, y: landmarks[1].y };
                        }
                        drawUI(landmarks, false);
                    });
                }

                if (isTracking) {
                    if (activeFace) {
                        const ratio = (activeFace[1].x - activeFace[234].x) / (activeFace[454].x - activeFace[234].x);
                        currentState = ratio < 0.38 ? "左轉" : (ratio > 0.62 ? "右轉" : "正臉");
                        if (currentState === "正臉") stats.front += deltaTime;
                        else if (currentState === "左轉") stats.left += deltaTime;
                        else if (currentState === "右轉") stats.right += deltaTime;
                    } else {
                        currentState = "遺失";
                        stats.lost += deltaTime;
                    }
                    if (currentState === lastState) currentContinuousTime += deltaTime;
                    else { currentContinuousTime = 0; hasScreenshotTaken = false; }
                    lastState = currentState;

                    const threshold = parseFloat(document.getElementById("thresholdSelect").value);
                    if (threshold > 0 && currentState !== "正臉" && currentState !== "none" && currentContinuousTime >= threshold && !hasScreenshotTaken) {
                        takeScreenshot(currentState, currentContinuousTime);
                        hasScreenshotTaken = true;
                    }
                    drawUI(activeFace, true, `${currentState} ${currentContinuousTime.toFixed(1)}s`);
                }
                updateDashboard();
            }
            requestAnimationFrame(renderLoop);
        }

        function updateDashboard() {
            document.getElementById("time-front").innerText = stats.front.toFixed(1) + "s";
            document.getElementById("time-left").innerText = stats.left.toFixed(1) + "s";
            document.getElementById("time-right").innerText = stats.right.toFixed(1) + "s";
            document.getElementById("time-lost").innerText = stats.lost.toFixed(1) + "s";
        }

        function drawUI(landmarks, isTarget, label = "") {
            if (!landmarks) return;
            ctx.strokeStyle = isTarget ? "#00ff88" : "rgba(255,255,255,0.2)";
            ctx.lineWidth = isTarget ? 6 : 2;
            [468, 473].forEach(i => {
                const p = landmarks[i];
                ctx.beginPath(); ctx.arc(p.x * canvas.width, p.y * canvas.height, 6, 0, 2*Math.PI); ctx.stroke();
            });
            if (isTarget) {
                ctx.fillStyle = "#00ff88"; 
                ctx.font = "bold 36px Arial"; // 畫面追蹤文字超級加大
                if (currentFacingMode === "user") {
                    ctx.save(); ctx.scale(-1, 1);
                    ctx.fillText(label, -(landmarks[10].x * canvas.width), landmarks[10].y * canvas.height - 30);
                    ctx.restore();
                } else {
                    ctx.fillText(label, landmarks[10].x * canvas.width, landmarks[10].y * canvas.height - 30);
                }
            }
        }

        document.getElementById("resetBtn").onclick = () => { 
            stats = { front: 0, left: 0, right: 0, lost: 0 }; 
            isTracking = false; targetFacePos = null;
            addLog("已重置", "#dc3545");
        };

        init();
    </script>
</body>
</html>
